<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考碎片 — 刘洋</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1224'/><text x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-size='18' font-weight='bold' fill='%234f8fff'>✍</text></svg>" />
    <style>
        :root {
            --bg: #0d1224;
            --bg-card: #131929;
            --bg-subtle: #1a2235;
            --border: rgba(255,255,255,0.08);
            --text-primary: #e8eaf0;
            --text-secondary: #8892a4;
            --text-muted: #5a6478;
            --accent: #4f8fff;
            --accent-soft: rgba(79,143,255,0.12);
            --tag-bg: rgba(79,143,255,0.15);
            --tag-text: #7ab3ff;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 10px;
            --max-width: 720px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.7;
            padding: 40px 20px 80px;
        }
        .wrapper { max-width: var(--max-width); margin: 0 auto; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 36px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .page-header { margin-bottom: 40px; }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .page-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .year-group { margin-bottom: 36px; }
        .year-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .post-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            text-decoration: none;
            transition: background 0.15s;
            border-radius: 6px;
            padding: 12px 10px;
            margin: 0 -10px;
        }
        .post-row:hover { background: var(--bg-card); }
        .post-date {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            padding-top: 2px;
            min-width: 52px;
        }
        .post-content { flex: 1; }
        .post-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.45;
        }
        .post-row:hover .post-title { color: var(--accent); }
        .post-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 8px;
        }
        .post-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--tag-bg);
            color: var(--tag-text);
            font-weight: 500;
        }
        .empty { color: var(--text-muted); font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>
<div class="wrapper">
    <a href="../../index.html" class="back-link">← 返回主页</a>

    <header class="page-header">
        <h1 class="page-title">思考碎片</h1>
        <p class="page-desc">对 AI 产品、技术演进、行业判断的持续记录</p>
    </header>

    <div id="archiveRoot"></div>
</div>

<script>
const posts = [
    {
        date: '2026.04',
        title: '工程演进三段论：从 Prompt 到 Harness，竞争重心在哪里',
        tags: ['工程演进'],
        url: 'posts/harness-engineering.html',
        summary: 'Prompt Engineering → Context Engineering → Harness Engineering，AI 工程的关注层次持续上移，2026 年的竞争重心已不在"谁的 Prompt 写得好"。'
    },
    {
        date: '2026.04',
        title: 'Agent 现在面临的三大工程问题',
        tags: ['Agent', '工程演进'],
        url: 'posts/agent-three-problems.html',
        summary: 'Agent 当前的瓶颈不在智能，而在工程：可靠性、成本和可控性，这三个问题决定了 Agent 的落地质量。'
    },
    {
        date: '2026.04',
        title: '2026 年 AI Agent 市场格局：开放 vs 封闭的博弈',
        tags: ['市场格局'],
        url: 'posts/market-landscape-2026.html',
        summary: 'Anthropic 的策略转变揭示了平台战的底层逻辑：谁控制了 Harness 层，谁就控制了 Agent 生态的价值分配。'
    },
    {
        date: '2026.03',
        title: '技术消亡度框架：判断哪些 AI 技术值得长期投入',
        tags: ['产品框架', '技术判断'],
        url: 'posts/tech-obsolescence.html',
        summary: '不是所有 AI 技术都有相同的生命周期。区分"补救缺陷型"和"编码知识型"是判断技术投资价值的核心框架。'
    },
    {
        date: '2026.03',
        title: 'RAG 的演进：从"被动检索"到"主动信息系统"',
        tags: ['技术判断', '架构设计'],
        url: 'posts/rag-evolution.html',
        summary: '现有 RAG 设计的四大问题揭示了演进方向：向量相似度不等于业务相关性，真正的 RAG 需要主动的、多跳的信息系统。'
    },
    {
        date: '2026.03',
        title: 'Skill 系统的本质：不是 Prompt 工程化，是 Harness 的支撑',
        tags: ['工程演进', '产品框架'],
        url: 'posts/skill-system-and-harness.html',
        summary: 'Skill 不是 Prompt Engineering 的工程化产物，而是为了解决 Agent 可靠性而被创造的标准化执行单元。'
    },
    {
        date: '2026.03',
        title: '微调的演进：哪些场景还值得做，哪些已被替代',
        tags: ['技术判断', '架构设计'],
        url: 'posts/finetuning-evolution.html',
        summary: '能力补救类微调正在被 RAG 和少样本学习替代，但成本优化和可控性微调永不消亡——两类微调的命运截然不同。'
    },
    {
        date: '2026.03',
        title: 'Prompt Engineering 的生命周期：哪些会消亡，哪些会留下',
        tags: ['工程演进', '技术判断'],
        url: 'posts/prompt-engineering-lifecycle.html',
        summary: '补救模型缺陷的 Prompt 技巧终将消亡，但定义约束和编码知识的那部分会持续演进——关键是分清你在做哪种事。'
    },
];

function render() {
    const root = document.getElementById('archiveRoot');
    if (!posts.length) {
        root.innerHTML = '<p class="empty">暂无文章。</p>';
        return;
    }
    // 按年份分组
    const byYear = {};
    posts.forEach(p => {
        const year = p.date.split('.')[0];
        if (!byYear[year]) byYear[year] = [];
        byYear[year].push(p);
    });
    const years = Object.keys(byYear).sort((a, b) => b - a);
    root.innerHTML = years.map(year => `
        <div class="year-group">
            <div class="year-label">${year}</div>
            ${byYear[year].map(p => `
                <a class="post-row" href="${p.url}" target="_blank" aria-label="${p.title}">
                    <span class="post-date">${p.date}</span>
                    <div class="post-content">
                        <div class="post-title">${p.title}</div>
                        <div class="post-summary">${p.summary}</div>
                        <div class="post-tags">
                            ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                </a>
            `).join('')}
        </div>
    `).join('');
}

render();
</script>
</body>
</html>
