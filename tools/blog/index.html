<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考碎片 — Leo Liu</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f5f4ed'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='18' font-weight='bold' fill='%23c96442'>✍</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg:        #f5f4ed;
            --bg-card:   #faf9f5;
            --bg-hover:  #f0eee6;
            --text-1:    #141413;
            --text-2:    #5e5d59;
            --text-3:    #87867f;
            --border:    #e8e6dc;
            --accent:    #2563eb;
            --clay:      #c96442;
            --clay-soft: rgba(201, 100, 66, 0.10);
        }
        [data-theme="dark"] {
            --bg:        #080c18;
            --bg-card:   rgba(255,255,255,0.04);
            --bg-hover:  rgba(255,255,255,0.07);
            --text-1:    #f0f4ff;
            --text-2:    #8a95b5;
            --text-3:    #4a5270;
            --border:    rgba(255,255,255,0.08);
            --accent:    #4f8fff;
            --clay:      #d97757;
            --clay-soft: rgba(217, 119, 87, 0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Source Sans 3', -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.7;
            transition: background 0.2s, color 0.2s;
        }
        .blog-layout {
            display: grid;
            grid-template-columns: 176px 1fr;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            min-height: 100vh;
            gap: 48px;
        }

        /* ── 左栏 ── */
        .blog-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 48px 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
            border-right: 1px solid var(--border);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-3);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--clay); }
        .search-box input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-1);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--clay); }
        .search-box input::placeholder { color: var(--text-3); }
        .cat-nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .cat-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background: transparent;
            font-family: 'Source Sans 3', -apple-system, sans-serif;
            font-size: 14px;
            color: var(--text-2);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-align: left;
        }
        .cat-btn:hover { background: var(--bg-hover); color: var(--text-1); }
        .cat-btn.active { color: var(--clay); font-weight: 600; background: var(--clay-soft); }
        .cat-count {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-3);
        }
        .cat-btn.active .cat-count { color: var(--clay); opacity: 0.7; }
        .blog-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 40px;
        }
        .theme-toggle {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            color: var(--text-3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color 0.2s, border-color 0.2s;
        }
        .theme-toggle:hover { color: var(--clay); border-color: var(--clay); }

        /* ── 右侧主区 ── */
        .blog-main { padding: 48px 0 80px; }
        .blog-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--clay);
        }
        .blog-title {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-1);
            margin: 8px 0 10px;
            line-height: 1.25;
        }
        .blog-desc { font-size: 14px; color: var(--text-2); }

        /* ── 文章列表 ── */
        .year-group { margin-bottom: 36px; }
        .year-label {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-size: 13px;
            color: var(--text-3);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .post-row {
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 0 20px;
            padding: 14px 12px;
            margin: 0 -12px;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: background 0.15s;
        }
        .post-row:hover { background: var(--bg-hover); }
        .post-date {
            font-size: 12px;
            color: var(--text-3);
            white-space: nowrap;
            padding-top: 2px;
        }
        .post-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-1);
            margin-bottom: 4px;
            line-height: 1.45;
            transition: color 0.15s;
        }
        .post-row:hover .post-title { color: var(--clay); }
        .post-summary {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.55;
            margin-bottom: 8px;
        }
        .post-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .post-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--clay-soft);
            color: var(--clay);
        }
        .empty { color: var(--text-3); font-size: 14px; padding: 20px 0; }
        .loading { color: var(--text-3); font-size: 14px; padding: 20px 0; }
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--clay-soft);
            color: var(--clay);
            line-height: 1;
        }
        .chip-clear {
            background: none;
            border: none;
            color: var(--clay);
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            line-height: 1;
            opacity: 0.7;
            font-family: inherit;
        }
        .chip-clear:hover { opacity: 1; }

        /* ── 移动端控件（桌面隐藏）── */
        .mobile-controls { display: none; }

        /* ── 响应式 ── */
        @media (max-width: 680px) {
            .blog-layout { grid-template-columns: 1fr; padding: 0 16px; gap: 0; }
            .blog-sidebar { display: none; }
            .blog-main { padding: 32px 0 60px; }
            .mobile-controls {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 28px;
            }
            .mobile-controls input {
                width: 100%;
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 7px 10px;
                font-size: 13px;
                font-family: inherit;
                color: var(--text-1);
                outline: none;
            }
            .mobile-controls input::placeholder { color: var(--text-3); }
            .cat-tabs { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
            .cat-tabs::-webkit-scrollbar { display: none; }
            .cat-tab {
                flex-shrink: 0;
                padding: 5px 14px;
                border-radius: 20px;
                border: 1px solid var(--border);
                background: transparent;
                font-family: 'Source Sans 3', -apple-system, sans-serif;
                color: var(--text-2);
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
                white-space: nowrap;
            }
            .cat-tab.active { background: var(--clay-soft); color: var(--clay); border-color: transparent; }
        }
    </style>
</head>
<body data-theme="">
<div class="blog-layout">

    <!-- 左栏 -->
    <aside class="blog-sidebar">
        <a class="back-link" href="../../index.html">← Leo Liu</a>
        <div class="search-box">
            <input id="searchInput" placeholder="搜索文章…" type="text" autocomplete="off" />
        </div>
        <div id="activeFilters" class="active-filters" style="display:none"></div>
        <nav class="cat-nav" aria-label="文章分类">
            <button class="cat-btn active" data-cat="all">全部 <span class="cat-count" id="cnt-all"></span></button>
            <button class="cat-btn" data-cat="技术">技术 <span class="cat-count" id="cnt-tech"></span></button>
            <button class="cat-btn" data-cat="产品">产品 <span class="cat-count" id="cnt-product"></span></button>
            <button class="cat-btn" data-cat="商业">商业 <span class="cat-count" id="cnt-biz"></span></button>
        </nav>
    </aside>

    <!-- 右侧主区 -->
    <main class="blog-main">
        <div class="blog-header">
            <header>
                <span class="blog-label">Writing</span>
                <h1 class="blog-title">思考碎片</h1>
                <p class="blog-desc">技术、产品、商业多角度拆解 AI 动态</p>
            </header>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <!-- 移动端控件 -->
        <div class="mobile-controls">
            <input id="searchInputMobile" placeholder="搜索文章…" type="text" autocomplete="off" />
            <div class="cat-tabs" role="tablist">
                <button class="cat-tab active" data-cat="all">全部</button>
                <button class="cat-tab" data-cat="技术">技术</button>
                <button class="cat-tab" data-cat="产品">产品</button>
                <button class="cat-tab" data-cat="商业">商业</button>
            </div>
        </div>

        <div id="archiveRoot"><div class="loading">加载中…</div></div>
    </main>

</div>

<script>
(function () {
    let posts = [], cat = 'all', query = '', timer;

    // ── 主题初始化 ──
    const savedTheme = localStorage.getItem('blog_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initTheme = savedTheme !== null ? savedTheme : (prefersDark ? 'dark' : '');
    document.body.dataset.theme = initTheme;
    updateThemeIcon(initTheme);

    function updateThemeIcon(theme) {
        document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
        document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    document.getElementById('themeToggle').addEventListener('click', function () {
        const next = document.body.dataset.theme === 'dark' ? '' : 'dark';
        document.body.dataset.theme = next;
        localStorage.setItem('blog_theme', next);
        updateThemeIcon(next);
    });

    // ── 数据加载 ──
    async function load() {
        try {
            const data = await fetch('data/posts-meta.json').then(r => r.json());
            posts = data.posts;
            updateCounts();
            render();
        } catch (e) {
            document.getElementById('archiveRoot').innerHTML =
                '<p class="empty">加载失败，请用 HTTP server 打开（file:// 协议不支持 fetch）。</p>';
        }
    }

    // ── 分类计数 ──
    function updateCounts() {
        const map = { all: posts.length, '技术': 0, '产品': 0, '商业': 0 };
        posts.forEach(function (p) { if (p.category in map) map[p.category]++; });
        document.getElementById('cnt-all').textContent = map.all;
        document.getElementById('cnt-tech').textContent = map['技术'];
        document.getElementById('cnt-product').textContent = map['产品'];
        document.getElementById('cnt-biz').textContent = map['商业'];
    }

    // ── 过滤 ──
    function filtered() {
        var r = cat !== 'all' ? posts.filter(function (p) { return p.category === cat; }) : posts.slice();
        if (query) {
            var q = query.toLowerCase();
            r = r.filter(function (p) {
                return p.title.toLowerCase().includes(q) ||
                    p.summary.toLowerCase().includes(q) ||
                    p.tags.some(function (t) { return t.toLowerCase().includes(q); });
            });
        }
        return r;
    }

    // ── 渲染 ──
    function render() {
        var root = document.getElementById('archiveRoot');
        var list = filtered();
        updateFilterChips();
        if (!list.length) {
            root.innerHTML = '<p class="empty">没有符合条件的文章。</p>';
            return;
        }
        // 按 YYYY.MM 分组（保留月份粒度）
        var byYM = {};
        list.forEach(function (p) {
            var ym = p.date;
            if (!byYM[ym]) byYM[ym] = [];
            byYM[ym].push(p);
        });
        root.innerHTML = Object.keys(byYM).sort(function (a, b) { return b > a ? -1 : 1; }).reverse().map(function (ym) {
            var label = ym.replace('.', ' · ');
            return '<div class="year-group">' +
                '<div class="year-label">' + label + '</div>' +
                byYM[ym].map(function (p) {
                    return '<a class="post-row" href="' + p.url + '" target="_blank" aria-label="' + p.title + '">' +
                        '<span class="post-date">' + p.date + '</span>' +
                        '<div class="post-content">' +
                        '<div class="post-title">' + p.title + '</div>' +
                        '<div class="post-summary">' + p.summary + '</div>' +
                        '<div class="post-tags">' + p.tags.map(function (t) {
                            return '<span class="post-tag">' + t + '</span>';
                        }).join('') + '</div>' +
                        '</div>' +
                        '</a>';
                }).join('') +
                '</div>';
        }).join('');
    }

    // ── 过滤状态 chip ──
    function updateFilterChips() {
        var box = document.getElementById('activeFilters');
        if (!box) return;
        var chips = [];
        if (cat !== 'all') {
            chips.push('<span class="filter-chip">' + cat + ' <button class="chip-clear" data-clear="cat" aria-label="清除分类">×</button></span>');
        }
        if (query) {
            chips.push('<span class="filter-chip">"' + query + '" <button class="chip-clear" data-clear="query" aria-label="清除搜索">×</button></span>');
        }
        box.innerHTML = chips.join('');
        box.style.display = chips.length ? 'flex' : 'none';
        box.querySelectorAll('.chip-clear').forEach(function (btn) {
            btn.addEventListener('click', function () {
                if (btn.dataset.clear === 'cat') {
                    setCategory('all');
                } else {
                    onSearch('');
                }
            });
        });
    }

    // ── 分类切换 ──
    function setCategory(c) {
        cat = c;
        document.querySelectorAll('[data-cat]').forEach(function (el) {
            el.classList.toggle('active', el.dataset.cat === c);
        });
        render();
    }

    // ── 搜索防抖 ──
    function onSearch(val) {
        query = val;
        var desktop = document.getElementById('searchInput');
        var mobile = document.getElementById('searchInputMobile');
        if (desktop && desktop.value !== val) desktop.value = val;
        if (mobile && mobile.value !== val) mobile.value = val;
        clearTimeout(timer);
        timer = setTimeout(render, 200);
    }

    // ── 事件绑定 ──
    document.querySelectorAll('[data-cat]').forEach(function (el) {
        el.addEventListener('click', function () { setCategory(el.dataset.cat); });
    });
    ['searchInput', 'searchInputMobile'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', function (e) { onSearch(e.target.value); });
    });

    load();
})();
</script>
</body>
</html>
