<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 产品洞察 · 刘洋</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f8fff'/><stop offset='1' stop-color='%239b6dff'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='%230d1224'/><text x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' font-weight='bold' fill='url(%23g)'>L</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/tools/ai-insights/style.css" />
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div>
                <h1 class="header-title">🔭 AI 产品洞察</h1>
                <p class="header-sub">AI PM 视角 · 深度拆解标杆产品的策略与设计</p>
            </div>
            <div class="header-meta">
                <span class="header-badge">持续更新中</span>
                <span class="header-count" id="productCount">-</span>
            </div>
        </div>
    </header>

    <!-- Filter -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-cat="all" onclick="filterCategory(this, 'all')">🌐 全部</button>
    </div>

    <!-- Product Grid -->
    <main class="product-grid" id="productGrid">
        <div class="loading">加载中...</div>
    </main>

    <!-- Product Detail Modal -->
    <div class="modal-overlay hidden" id="detailModal" onclick="closeDetail(event)">
        <div class="modal-card" id="detailContent"></div>
    </div>

    <footer class="footer">
        <p>📌 以上分析为个人观点，基于公开信息整理 · 刘洋 · AI 产品经理</p>
    </footer>

    <script src="/tools/ai-insights/script.js?v=3"></script>
</body>

</html>
