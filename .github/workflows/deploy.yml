name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API config
        env:
          ESOP_API_KEY: ${{ secrets.ESOP_API_KEY }}
          STOCK_OPENROUTER_KEY: ${{ secrets.STOCK_OPENROUTER_KEY }}
        run: |
          cat > tools/esop-extractor/config.local.js <<EOF
          window.ESOP_CONFIG = {
            builtinApiKey: '${ESOP_API_KEY}',
            baseUrl:       'https://openrouter.ai/api',
            model:         'stepfun/step-3.5-flash:free',
          };
          EOF
          cat > tools/stock/config.local.js <<EOF
          window.STOCK_CONFIG = {
            openrouterKey: '${STOCK_OPENROUTER_KEY}',
            model:         'stepfun/step-3.5-flash:free',
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
